[Spawning]
max_accounts_to_spawn = 10
slave_mode = headless
master_use_proxy = false

[Proxy]
proxy_failure_mode = loose
proxy_allocation_mode = round_robin
max_accounts_per_proxy = 3

[AntiDetection]
use_stealth_plugin = true
browser_binary = chrome
randomize_user_agent = true
block_webrtc = true
match_proxy_timezone = true
canvas_spoofing = true

[Triggers]
trigger_type = terminal
hotkey_validate = V
hotkey_cashout = C
hotkey_1 = 1
hotkey_2 = 2

[Memory]
record_action_sequence = true
replay_action_sequence = true
